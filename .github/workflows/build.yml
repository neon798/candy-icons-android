name: Build Candy Icons APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install cairosvg

      - name: Fetch Lawnicons appfilter.xml
        run: curl -L -o lawnicons_appfilter.xml https://raw.githubusercontent.com/LawnchairLauncher/lawnicons/develop/appfilter.xml

      - name: Prebuild (generate PNGs + appfilter.xml)
        run: |
          chmod +x scripts/prebuild.sh
          ./scripts/prebuild.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CandyIcons-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CandyIcons-APK-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
